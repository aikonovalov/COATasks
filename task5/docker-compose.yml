networks:
  kafka-net:
    driver: bridge

volumes:
  clickhouse-data:
  postgres-data:
  minio-data:

services:
  kafka1:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka1
    container_name: kafka1
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka1:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./kafka_cluster/kafka1:/var/lib/kafka/data
    
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s
    
    networks:
      - kafka-net

  kafka2:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka2
    container_name: kafka2
    ports:
      - "9094:9092"
      - "9095:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka2:9092,CONTROLLER://kafka2:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka2:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./kafka_cluster/kafka2:/var/lib/kafka/data
    
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka2:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s
    
    networks:
      - kafka-net

  kafka3:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka3
    container_name: kafka3
    ports:
      - "9096:9092"
      - "9097:9093"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093,2@kafka2:9093,3@kafka3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka3:9092,CONTROLLER://kafka3:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka3:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      CLUSTER_ID: "EmptNWtoR4GGWx-BH6nGLQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - ./kafka_cluster/kafka3:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka3:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s
    
    networks:
      - kafka-net

  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]

    command:
      - |
        set -e
        for i in $$(seq 1 60); do
          if kafka-broker-api-versions --bootstrap-server kafka1:9092 >/dev/null 2>&1; then
            break
          fi
          echo "Waiting for Kafka..."
          sleep 2
        done
        kafka-topics --bootstrap-server kafka1:9092,kafka2:9092,kafka3:9092 \
          --create --if-not-exists \
          --topic movie-events \
          --partitions 3 \
          --replication-factor 3 \
          --config min.insync.replicas=2
        echo "Topic movie-events ready."
    networks:
      - kafka-net
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    hostname: schema-registry
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092,kafka3:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - kafka-net

  schema-registry-init:
    image: python:3.12-alpine
    container_name: schema-registry-init
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./proto:/proto:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/reg.py << 'PYEOF'
        import json, sys, urllib.request, urllib.error

        SR = "http://schema-registry:8081"

        def post(path, body):
            data = json.dumps(body).encode()
            req = urllib.request.Request(
                f"{SR}{path}", data=data,
                headers={"Content-Type": "application/vnd.schemaregistry.v1+json"})
            try:
                with urllib.request.urlopen(req) as r:
                    print(f"{path}: {r.status}"); return json.loads(r.read())
            except urllib.error.HTTPError as e:
                if e.code == 409:
                    print(f"{path}: already registered (409)")
                else:
                    print(f"{path}: FAILED {e.code} {e.read()}", file=sys.stderr); sys.exit(1)

        def get(path):
            with urllib.request.urlopen(f"{SR}{path}") as r:
                return json.loads(r.read())

        ts = open("/proto/google/protobuf/timestamp.proto").read()
        ev = open("/proto/event.proto").read()

        post("/subjects/google-protobuf-timestamp/versions",
             {"schemaType": "PROTOBUF", "schema": ts})

        v = get("/subjects/google-protobuf-timestamp/versions/latest")["version"]

        post("/subjects/movie-events-value/versions",
             {"schemaType": "PROTOBUF", "schema": ev,
              "references": [{"name": "google/protobuf/timestamp.proto",
                              "subject": "google-protobuf-timestamp",
                              "version": v}]})
        print("Schema registration complete")
        PYEOF
        python3 /tmp/reg.py
    networks:
      - kafka-net
    restart: "no"

  movie-producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: movie-producer
    ports:
      - "8082:8080"
    environment:
      KAFKA_BROKERS: kafka1:9092,kafka2:9092,kafka3:9092
      KAFKA_TOPIC: movie-events
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_SUBJECT: movie-events-value
      HTTP_PORT: "8080"
      GENERATOR_MODE: "true"
      GENERATOR_INTERVAL_MS: "500"
      KAFKA_RETRIES: "5"
      KAFKA_RETRY_BACKOFF_INIT_MS: "100"
      KAFKA_RETRY_BACKOFF_MAX_MS: "10000"
    depends_on:
      schema-registry-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - kafka-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d:ro
      - ./clickhouse/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./proto/event.proto:/var/lib/clickhouse/format_schemas/event.proto:ro
      - ./proto/google/protobuf/timestamp.proto:/var/lib/clickhouse/format_schemas/google/protobuf/timestamp.proto:ro
      - clickhouse-data:/var/lib/clickhouse
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - kafka-net

  integration-tests:
    build:
      context: tests
      dockerfile: Dockerfile
    container_name: integration-tests
    environment:
      PRODUCER_URL: http://movie-producer:8080
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on:
      movie-producer:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - kafka-net
    profiles:
      - test

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
      POSTGRES_DB: cinema
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - kafka-net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - kafka-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $$(seq 1 60); do
          if mc alias set local http://minio:9000 minio minio123 2>/dev/null; then
            if mc ready local 2>/dev/null; then
              break
            fi
          fi
          sleep 1
        done
        mc mb local/movie-analytics --ignore-existing
        echo "bucket movie-analytics ready"
    networks:
      - kafka-net
    restart: "no"

  aggregator:
    build:
      context: aggregator
      dockerfile: Dockerfile
    container_name: aggregator
    ports:
      - "8090:8090"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      POSTGRES_DSN: postgres://cinema:cinema@postgres:5432/cinema?sslmode=disable
      HTTP_PORT: "8090"
      AGGREGATE_INTERVAL_SECONDS: "300"
      S3_EXPORT_ENABLED: "true"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: movie-analytics
      AWS_REGION: us-east-1
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kafka-net

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - kafka-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9092,kafka3:9092
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kafka-net
