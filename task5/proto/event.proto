syntax = "proto3";

package movie.events;

option go_package = "movie/producer/gen;eventpb";

import "google/protobuf/timestamp.proto";

enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    VIEW_STARTED = 1;
    VIEW_FINISHED = 2;
    VIEW_PAUSED = 3;
    VIEW_RESUMED = 4;
    LIKED = 5;
    SEARCHED = 6;
}

enum DeviceType {
    DEVICE_TYPE_UNSPECIFIED = 0;
    MOBILE = 1;
    DESKTOP = 2;
    TV = 3;
    TABLET = 4;
}

message Event {
    bytes event_id = 1;
    string user_id = 2;
    string movie_id = 3;

    EventType event_type = 4;
    google.protobuf.Timestamp timestamp = 5;
    DeviceType device_type = 6;
    string session_id = 7;
    int32 progress_seconds = 8;

}
