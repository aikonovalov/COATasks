syntax = "proto3";

package flight_service.v1;

import "google/protobuf/timestamp.proto";

enum FlightStatus {
    UNSPECIFIED = 0;
    SCHEDULED = 1;
    DEPARTED = 4;
    CANCELLED = 3;
    COMPLETED = 5;
}

message FlightRoute {
    string origin = 3;
    string destination = 4;
}

message Flight {
    string id = 1;

    string flight_number = 2;

    google.protobuf.Timestamp departure_time = 5;
    google.protobuf.Timestamp arrival_time = 6;

    uint32 total_seats = 7;
    uint32 available_seats = 8;

    uint32 ticket_price = 9;

    FlightStatus status = 10;
}

enum SeatReservationStatus {
    UNSPECIFIED = 0;
    ACTIVE = 1;
    CANCELLED = 2;
    EXPIRED = 3;
}

message SeatReservation {
    
}

message SearchFlightsRequest {
    string id;
}

message SearchFlightsResponse {

}

message GetFlightRequest {
    string id = 1;
}

message GetFlightResponse {
    Flight data = 1;
}

message ReserveSeatsRequest {

}

message ReserveSeatsResponse {

}

message ReleaseReservationRequest {

}

message ReleaseReservationResponse {

}

service FlightService {

    rpc SearchFlights(SearchFlightsRequest)
        returns (SearchFlightsResponse);

    rpc GetFlight(GetFlightRequest)
        returns (GetFlightResponse);

    rpc ReserveSeats(ReserveSeatsRequest)
        returns (ReserveSeatsResponse);

    rpc ReleaseReservation(ReleaseReservationRequest)
        returns (ReleaseReservationResponse);
}