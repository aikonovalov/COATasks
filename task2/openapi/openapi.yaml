components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]
    
    ProductCreate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000, nullable: true }
        price: { type: number, format: double, minimum: 0.01 }
        stock: { type: integer, minimum: 0 }
        category: { type: string, minLength: 1, maxLength: 100 }
        status: { $ref: "#/components/schemas/ProductStatus" }
    
    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000, nullable: true }
        price: { type: number, format: double, minimum: 0.01 }
        stock: { type: integer, minimum: 0 }
        category: { type: string, minLength: 1, maxLength: 100 }
        status: { $ref: "#/components/schemas/ProductStatus" }
    
    ProductResponse:
      type: object
      required: [id, name, price, stock, category, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: double }
        stock: { type: integer }
        category: { type: string }
        status: { $ref: "#/components/schemas/ProductStatus" }
        seller_id: { type: string, format: uuid, nullable: true, description: "Владелец-продавец" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    
    ProductListResponse:
      type: object
      required: [productList, totalElements, page, pageSize]
      properties:
        productList:
          type: array
          items: { $ref: "#/components/schemas/ProductResponse" }
        totalElements: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    

    ErrorResponse:
      type: object
      required: [error_code, message]
      properties:
        error_code: { $ref: "#/components/schemas/ErrorCode" }
        message: { type: string}
        details: { type: object, nullable: true}

    ErrorCode:
      type: string
      enum:
        - PRODUCT_NOT_FOUND
        - PRODUCT_INACTIVE
        - ORDER_NOT_FOUND
        - ORDER_LIMIT_EXCEEDED
        - ORDER_HAS_ACTIVE
        - INVALID_STATE_TRANSITION
        - INSUFFICIENT_STOCK
        - PROMO_CODE_INVALID
        - PROMO_CODE_MIN_AMOUNT
        - ORDER_OWNERSHIP_VIOLATION
        - VALIDATION_ERROR
        - TOKEN_EXPIRED
        - TOKEN_INVALID
        - REFRESH_TOKEN_INVALID
        - ACCESS_DENIED
      
      error-catalog:
        PRODUCT_NOT_FOUND: { http: 404, when: "Товар не найден по ID"}
        PRODUCT_INACTIVE: { http: 409, when: "Попытка заказать неактивный товар"}
        ORDER_NOT_FOUND: { http: 404, when: "Заказ не найден по ID"}
        ORDER_LIMIT_EXCEEDED: { http: 429, when: "Превышен лимит частоты создания/обновления заказа"}
        ORDER_HAS_ACTIVE: { http: 409, when: "У пользователя уже есть активный заказ"}
        INVALID_STATE_TRANSITION: { http: 409, when: "Недопустимый переход состояния заказа"}
        INSUFFICIENT_STOCK: { http: 409, when: "Недостаточно товара на складе"}
        PROMO_CODE_INVALID: { http: 422, when: "Промокод не найден, истёк, исчерпан или неактивен"}
        PROMO_CODE_MIN_AMOUNT: { http: 422, when: "Сумма заказа ниже минимальной для промокода"}
        ORDER_OWNERSHIP_VIOLATION: { http: 403, when: "Заказ принадлежит другому пользователю"}
        VALIDATION_ERROR: { http: 400, when: "Ошибка валидации входных данных"}
        TOKEN_EXPIRED: { http: 401, when: "Access token истёк"}
        TOKEN_INVALID: { http: 401, when: "Невалидный access token"}
        REFRESH_TOKEN_INVALID: { http: 401, when: "Невалидный refresh token"}
        ACCESS_DENIED: { http: 403, when: "Недостаточно прав"}

paths:
  /products:
    get:
      summary: Список товаров
      tags: [Products]
      security:
        - bearerAuth: []
      
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
          description: Номер страницы
        - name: size
          in: query
          schema: { type: integer, default: 20 }
          description: Размер страницы
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/ProductStatus" }
          description: Статус
        - name: category
          in: query
          schema: { type: string }
          description: Категория
      
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductListResponse" }
    
    post:
      summary: Создание товара
      tags: [Products]
      security:
        - bearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductCreate" }
      
      responses:
        "201":
          description: Создан
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductResponse" }
        
        "400":
          description: Ошибка валидации входных данных
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: VALIDATION_ERROR
                message: "Ошибка валидации входных данных"
                details: null
        
        "403":
          description: Недостаточно прав
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: ACCESS_DENIED
                message: "Недостаточно прав для операции"
                details: null
  
  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Получение товара по ID
      tags: [Products]
      security:
        - bearerAuth: []
      
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductResponse" }
        
        "404":
          description: Товар не найден по ID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: PRODUCT_NOT_FOUND
                message: "Товар не найден по ID"
                details: null
    put:
      summary: Обновление товара
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductResponse" }
        
        "400":
          description: Ошибка валидации входных данных
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: VALIDATION_ERROR
                message: "Ошибка валидации входных данных"
                details: null
        
        "403":
          description: Недостаточно прав
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: ACCESS_DENIED
                message: "Недостаточно прав"
                details: null
        
        "404":
          description: Товар не найден по ID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: PRODUCT_NOT_FOUND
                message: "Товар не найден по ID"
                details: null
    
    delete:
      summary: Мягкое удаление
      tags: [Products]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Успешно
        
        "403":
          description: Недостаточно прав
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: ACCESS_DENIED
                message: "Недостаточно прав"
                details: null
        
        "404":
          description: Товар не найден по ID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error_code: PRODUCT_NOT_FOUND
                message: "Товар не найден по ID"
                details: null

tags:
 - name: Profile
   description: "Профиль"
 - name: Products
   description: "Товары" 

